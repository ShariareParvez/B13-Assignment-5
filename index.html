<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Github Issue Tracker</title>

  <!-- tailwindcss -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet" />

  <!-- Custom Styles -->
  <style>
    * {
      font-family: "Geist", sans-serif;
    }
  </style>
</head>

<body class="bg-[#F8FAFC]">

  <header class="bg-white">
    <div class="flex items-center justify-between w-11/12 py-[17px] mx-auto">
      <div class="flex items-center gap-1">
        <img class="w-[36px]" src="./assets/github-logo.png" alt="GitHub Logo" />
        <h1 class="text-xl font-bold text-[#1F2937]">
          GitHub Issues Tracker
        </h1>
      </div>

      <div class="flex gap-2">
        <input id="searchInput" placeholder="Search issues..." class="p-2 border rounded" />
        <button onclick="searchIssue()" class="px-3 text-white bg-[#4A00FF] rounded">
          + New Issue
        </button>
      </div>
    </div>
  </header>

  <section>
    <div id="loginPage" class="flex items-center justify-center h-screen">
      <div class="p-8 bg-white shadow w-[520px] rounded-xl">
  
        <div class="flex flex-col items-center gap-3">
          <img src="assets/github-logo.png" alt="GitHub Logo" />
          <h1 class="flex mb-2 text-2xl font-bold">
            GitHub Issues Tracker
          </h1>
        </div>
        <p class="mb-6 text-center text-gray-500">
          Sign in to manage your issues
        </p>
        <label class="mb-[6px] block font-medium text-[16px]" for="username">
          Username
        </label>
        <input id="username" class="w-full p-2 border rounded" placeholder="Enter Username" />
        <p class="mb-4 text-[#4A00FF]">Default: admin</p>
        <label class="mb-[6px] block font-medium text-[16px]" for="password">
          Password
        </label>
        <input id="password" type="password" class="w-full p-2 border rounded" placeholder="Enter Password" />
        <p class="mb-4 text-[#4A00FF]">Default: admin123</p>
        <button onclick="login()" class="w-full py-2 text-white bg-[#4A00FF] rounded mb-[24px]">
          Sign In
        </button>
        <p class="text-[16px] text-center text-[#1F2937]">or</p>
        <p class="text-[16px] text-center text-[#64748B] font-[16px]">
          Demo Credentials:
        </p>
        <p class="mt-4 text-sm text-center text-gray-500 font-extralight">
          <span class="font-semibold">Username:</span> admin <br />
          <span class="font-semibold">Password:</span> admin123
        </p>
      </div>
    </div>
  </section>

  <div id="mainPage" class="hidden p-8">
  
    <div class="flex gap-3 p-6 mb-4 bg-white shadow rounded-xl">
      <button onclick="switchTab('all')" id="tab-all" class="px-4 py-2 text-white bg-[#4A00FF] rounded tabBtn">
        All
      </button>
  
      <button onclick="switchTab('open')" id="tab-open" class="px-4 py-2 bg-gray-200 rounded tabBtn">
        Open
      </button>
  
      <button onclick="switchTab('closed')" id="tab-closed" class="px-4 py-2 bg-gray-200 rounded tabBtn">
        Closed
      </button>
    </div>
  
    <div class="flex items-center justify-between p-6 mb-6 bg-white shadow rounded-xl">
      <div class="flex items-center gap-3">
        <img src="assets/Aperture.png" alt="" />
  
        <div>
          <span id="issueCount" class="text-xl font-semibold text-[#1F2937]">
            0 Issues
          </span>
          <br />
  
          <span class="text-[#64748B] font-[16px]">
            Track and manage your project issues
          </span>
        </div>
      </div>
  
      <div class="flex gap-4 text-sm">
        <div class="flex items-center gap-2">
          <div class="w-3 h-3 bg-green-500 rounded-full"></div>
          Open
        </div>
  
        <div class="flex items-center gap-2">
          <div class="w-3 h-3 bg-purple-500 rounded-full"></div>
          Closed
        </div>
      </div>
    </div>
  
  
    <div id="loading" class="hidden mb-6 text-center">
      Loading...
    </div>
  
    <div id="issuesContainer" class="grid grid-cols-1 gap-5 md:grid-cols-2 lg:grid-cols-4"></div>
  </div>
